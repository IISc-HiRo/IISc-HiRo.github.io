# -----------------------------------------------------------------------------
# Publications
# -----------------------------------------------------------------------------
# This file drives the Publications page (/publications/). To add a paper, copy
# an entry below and fill it in. Entries are grouped on the page by `year`
# (newest first) in the order they appear here within each year.
#
# Fields:
#   id       Unique anchor slug. Lets other pages deep-link to this paper, e.g.
#            /publications/#ovita. Keep it short, lowercase, and stable.
#   title    Paper title (HTML allowed, e.g. <sup>2</sup>)
#   authors  Author list as a single string
#   venue    Full venue name (shown under the authors)
#   tag      Short venue badge shown on the thumbnail (e.g. ICRA'26)
#   year     Publication year (controls grouping/sorting)
#   type     conference | journal | workshop  (controls the filter buttons)
#   image    Filename in assets/img/publication_preview/
#   links    List of { label, url }. Omit `url` to show a non-clickable label.
# -----------------------------------------------------------------------------

